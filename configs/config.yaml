paths:
  raw_dir: data/raw/msmarco_passage
  processed_dir: data/processed/msmarco_passage
  artifacts_dir: artifacts
limits:
  max_passages: 500000
  max_train_queries: 20000
  max_dev_queries: 2000
retriever:
  model_name: distilbert-base-uncased
  max_len: 128
  batch_size: 32
  lr: 2.0e-05
  epochs: 2
  normalize: true
  seed: 42
  neg_topk: 100
  neg_per_query: 8
  candidate_k: 1000
  max_train_pairs: 10000
  max_train_queries: 5000
  neg_start_rank: 50
faiss:
  index_type: flatip
  encoder_backend: sentence_transformer
  st_model_name: sentence-transformers/all-MiniLM-L6-v2
  topk: 100
ranker:
  objective: lambdarank
  num_leaves: 127
  learning_rate: 0.05
  n_estimators: 200
  eval_at: 10
indexing:
  batch_size: 128
